name: release

on:
  push:
    tags: ['v*']

env:
  # Bypass proxy.golang.org for boanlab/* modules; see ci.yml.
  GOPRIVATE: github.com/boanlab/*

jobs:
  go-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Check go-fmt
        run: make gofmt

  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Run golangci-lint
        run: make golangci-lint

  go-sec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Run Gosec Security Scanner
        run: make gosec

  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Run unit tests
        run: make test

  push-image:
    needs: [go-fmt, go-lint, go-sec, go-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push outrelay-relay image
        run: make TAG=${{ github.ref_name }} push-image
